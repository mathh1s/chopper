# chopper behind nginx or openresty.
#
# The two things that matter here: uploads are large, and a yt-dlp fetch of a
# long track can sit there for minutes before the first byte comes back. The
# default proxy timeouts will cut both off.

server {
    listen 443 ssl http2;
    server_name chopper.mathiiis.de;

    ssl_certificate     /etc/letsencrypt/live/chopper.mathiiis.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chopper.mathiiis.de/privkey.pem;

    client_max_body_size 400m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # yt-dlp plus ffmpeg on a long track. Do not shorten these.
        proxy_read_timeout    900s;
        proxy_send_timeout    900s;
        proxy_connect_timeout 30s;

        # Range requests on the wav files need to pass straight through.
        proxy_buffering off;
        proxy_request_buffering off;
    }
}

server {
    listen 80;
    server_name chopper.mathiiis.de;
    return 301 https://$host$request_uri;
}
