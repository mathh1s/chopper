services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chopper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: chopper
    volumes:
      - db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chopper"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      args:
        WITH_DEMUCS: ${WITH_DEMUCS:-0}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://chopper:${POSTGRES_PASSWORD}@db:5432/chopper?sslmode=disable
      AUTH_PASSWORD: ${AUTH_PASSWORD:?set AUTH_PASSWORD in .env}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-300}
      SECURE_COOKIE: ${SECURE_COOKIE:-true}
      DEMUCS_BIN: ${DEMUCS_BIN:-}
    volumes:
      - audio:/data
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  db:
  audio:
